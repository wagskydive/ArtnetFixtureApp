name: Unity EditMode Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-editmode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+ArtnetFixture.Core'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-editmode-test-results
          path: artifacts

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-editmode-coverage
          path: CodeCoverage
